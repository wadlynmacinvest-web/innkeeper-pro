name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: static
        run: npm install

      - name: Prepare Web Directory
        working-directory: static
        run: |
          mkdir -p www
          cp index.html www/

      - name: Capacitor Sync
  working-directory: static
  run: npx @capacitor/cli sync android
  


      - name: Build Android APK
        working-directory: static/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: static/android/app/build/outputs/apk/debug/app-debug.apk
